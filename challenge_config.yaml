title: MiniGrid HTTP Agent Challenge
short_description: Evaluate a remotely hosted MiniGrid agent via POST /act.
description: templates/description.html
evaluation_details: templates/evaluation_details.html
terms_and_conditions: templates/terms_and_conditions.html
image: logo.jpg
submission_guidelines: templates/submission_guidelines.html
category: [Environment, Workshop]
leaderboard_description: Public leaderboard columns follow the placeholder task contract on the public split. Private split columns remain hidden from participants.
evaluation_script: evaluation_script.zip
remote_evaluation: True
start_date: 2026-03-12 00:00:00
end_date: 2099-12-31 23:59:59
published: True
tags:
  - minigrid
  - reinforcement-learning
  - embodied-ai
  - remote-evaluation

leaderboard:
  - id: 1
    schema:
      labels:
        - BinFill
        - PickXtimes
        - SwingXtimes
        - StopCube
        - VideoUnmask
        - VideoUnmaskSwap
        - ButtonUnmask
        - ButtonUnmaskSwap
        - PickHighlight
        - VideoRepick
        - VideoPlaceButton
        - VideoPlaceOrder
        - MoveCube
        - InsertPeg
        - PatternLock
        - RouteStick
        - SuccessRate
        - OverallSuccessRate
      default_order_by: OverallSuccessRate
      metadata:
        BinFill:
          sort_ascending: false
          description: Placeholder success metric for the BinFill task on this split.
        PickXtimes:
          sort_ascending: false
          description: Placeholder success metric for the PickXtimes task on this split.
        SwingXtimes:
          sort_ascending: false
          description: Placeholder success metric for the SwingXtimes task on this split.
        StopCube:
          sort_ascending: false
          description: Placeholder success metric for the StopCube task on this split.
        VideoUnmask:
          sort_ascending: false
          description: Placeholder success metric for the VideoUnmask task on this split.
        VideoUnmaskSwap:
          sort_ascending: false
          description: Placeholder success metric for the VideoUnmaskSwap task on this split.
        ButtonUnmask:
          sort_ascending: false
          description: Placeholder success metric for the ButtonUnmask task on this split.
        ButtonUnmaskSwap:
          sort_ascending: false
          description: Placeholder success metric for the ButtonUnmaskSwap task on this split.
        PickHighlight:
          sort_ascending: false
          description: Placeholder success metric for the PickHighlight task on this split.
        VideoRepick:
          sort_ascending: false
          description: Placeholder success metric for the VideoRepick task on this split.
        VideoPlaceButton:
          sort_ascending: false
          description: Placeholder success metric for the VideoPlaceButton task on this split.
        VideoPlaceOrder:
          sort_ascending: false
          description: Placeholder success metric for the VideoPlaceOrder task on this split.
        MoveCube:
          sort_ascending: false
          description: Placeholder success metric for the MoveCube task on this split.
        InsertPeg:
          sort_ascending: false
          description: Placeholder success metric for the InsertPeg task on this split.
        PatternLock:
          sort_ascending: false
          description: Placeholder success metric for the PatternLock task on this split.
        RouteStick:
          sort_ascending: false
          description: Placeholder success metric for the RouteStick task on this split.
        SuccessRate:
          sort_ascending: false
          description: Placeholder aggregate success rate for the task contract on this split.
        OverallSuccessRate:
          sort_ascending: false
          description: Placeholder overall success rate used for leaderboard ordering until real task scoring is wired.

challenge_phases:
  - id: 1
    name: Dev Phase
    description: templates/challenge_phase_1_description.html
    leaderboard_public: False
    is_public: True
    challenge: 1
    is_active: True
    max_concurrent_submissions_allowed: 99999
    allowed_email_ids: []
    disable_logs: False
    is_submission_public: True
    start_date: 2026-03-12 00:00:00
    end_date: 2099-12-31 23:59:59
    test_annotation_file: annotations/test_annotations_devsplit.json
    codename: dev
    max_submissions_per_day: 99999
    max_submissions_per_month: 99999
    max_submissions: 99999
    default_submission_meta_attributes:
      - name: method_name
        is_visible: True
      - name: method_description
        is_visible: True
      - name: project_url
        is_visible: True
      - name: publication_url
        is_visible: True
    submission_meta_attributes: []
