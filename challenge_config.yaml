# If you are not sure what these fields mean, refer to:
# https://evalai.readthedocs.io/en/latest/configuration.html
title: MiniGrid HTTP Agent Challenge
short_description: Evaluate a remotely hosted MiniGrid agent via POST /act.
description: templates/description.html
evaluation_details: templates/evaluation_details.html
terms_and_conditions: templates/terms_and_conditions.html
image: logo.jpg
submission_guidelines: templates/submission_guidelines.html
category: [Environment, Workshop]
leaderboard_description: Public leaderboard metrics come from the MiniGrid public split. Private split scores are hidden from participants.
evaluation_script: evaluation_script.zip
remote_evaluation: True
start_date: 2026-03-12 00:00:00
end_date: 2099-12-31 23:59:59
published: True
tags:
  - minigrid
  - reinforcement-learning
  - embodied-ai
  - remote-evaluation

leaderboard:
  - id: 1
    schema:
      labels:
        - AverageReward
        - SuccessRate
        - AverageSteps
        - Episodes
      default_order_by: AverageReward
      metadata:
        AverageReward:
          sort_ascending: false
          description: Mean episode reward on the split.
        SuccessRate:
          sort_ascending: false
          description: Fraction of episodes with positive total reward.
        AverageSteps:
          sort_ascending: true
          description: Mean number of agent actions per episode.
        Episodes:
          sort_ascending: false
          description: Number of evaluated episodes in the split.

challenge_phases:
  - id: 1
    name: Dev Phase
    description: templates/challenge_phase_1_description.html
    leaderboard_public: False
    is_public: True
    challenge: 1
    is_active: True
    max_concurrent_submissions_allowed: 99999
    allowed_email_ids: []
    disable_logs: False
    is_submission_public: True
    start_date: 2026-03-12 00:00:00
    end_date: 2099-12-31 23:59:59
    test_annotation_file: annotations/test_annotations_devsplit.json
    codename: dev
    max_submissions_per_day: 99999
    max_submissions_per_month: 99999
    max_submissions: 99999
    default_submission_meta_attributes:
      - name: method_name
        is_visible: True
      - name: method_description
        is_visible: True
      - name: project_url
        is_visible: True
      - name: publication_url
        is_visible: True
    submission_meta_attributes: []
    is_restricted_to_select_one_submission: False
    is_partial_submission_evaluation_enabled: False
    allowed_submission_file_types: ".json"
  - id: 2
    name: Test Phase
    description: templates/challenge_phase_2_description.html
    leaderboard_public: True
    is_public: True
    challenge: 1
    is_active: True
    max_concurrent_submissions_allowed: 3
    allowed_email_ids: []
    disable_logs: False
    is_submission_public: True
    start_date: 2026-03-12 00:00:00
    end_date: 2099-12-31 23:59:59
    test_annotation_file: annotations/test_annotations_testsplit.json
    codename: test
    max_submissions_per_day: 20
    max_submissions_per_month: 200
    max_submissions: 1000
    default_submission_meta_attributes:
      - name: method_name
        is_visible: True
      - name: method_description
        is_visible: True
      - name: project_url
        is_visible: True
      - name: publication_url
        is_visible: True
    submission_meta_attributes: []
    is_restricted_to_select_one_submission: False
    is_partial_submission_evaluation_enabled: False
    allowed_submission_file_types: ".json"

dataset_splits:
  - id: 1
    name: Public Split
    codename: public_split
  - id: 2
    name: Private Split
    codename: private_split

challenge_phase_splits:
  - challenge_phase_id: 1
    leaderboard_id: 1
    dataset_split_id: 1
    visibility: 2
    leaderboard_decimal_precision: 2
    is_leaderboard_order_descending: True
    show_execution_time: True
    show_leaderboard_by_latest_submission: True
  - challenge_phase_id: 2
    leaderboard_id: 1
    dataset_split_id: 1
    visibility: 3
    leaderboard_decimal_precision: 2
    is_leaderboard_order_descending: True
    show_execution_time: True
    show_leaderboard_by_latest_submission: True
  - challenge_phase_id: 2
    leaderboard_id: 1
    dataset_split_id: 2
    visibility: 1
    leaderboard_decimal_precision: 2
    is_leaderboard_order_descending: True
    show_execution_time: True
    show_leaderboard_by_latest_submission: False
